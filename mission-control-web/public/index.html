<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control 🎯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎯 Mission Control</h1>
    <nav>
      <button class="tab-btn active" data-tab="kanban">📋 Kanban</button>
      <a href="/gantt.html" class="tab-btn" style="display: inline-block; text-decoration: none; color: inherit;">📊 Gantt</a>
      <button class="tab-btn" data-tab="bookmarks">🐦 X Bookmarks</button>
      <button class="tab-btn" data-tab="documents">📄 Dokument</button>
      <button class="tab-btn" data-tab="images">🖼️ Bilder</button>
      <button class="tab-btn" data-tab="sis">📝 SiS-dokument</button>
    </nav>
  </header>

  <main>
    <!-- Kanban Tab -->
    <section id="kanban-tab" class="tab-content active">
      <div class="kanban-header">
        <h2>📋 Kanban Board</h2>
        <select id="context-filter" class="context-filter">
          <option value="all">Alla kontexter</option>
          <option value="@dator">@dator</option>
          <option value="@telefon">@telefon</option>
          <option value="@vps">@vps</option>
          <option value="@garaget">@garaget</option>
        </select>
      </div>

      <div class="kanban-board">
        <div class="kanban-column" data-state="inbox">
          <h3>📥 Inbox</h3>
          <div class="tasks" id="inbox-tasks"></div>
          <button class="add-task-btn" data-state="inbox">+ Lägg till</button>
        </div>

        <div class="kanban-column" data-state="next">
          <h3>▶️ Nästa steg</h3>
          <div class="tasks" id="next-tasks"></div>
          <button class="add-task-btn" data-state="next">+ Lägg till</button>
        </div>

        <div class="kanban-column" data-state="doing">
          <h3>🚧 Pågående</h3>
          <div class="tasks" id="doing-tasks"></div>
          <button class="add-task-btn" data-state="doing">+ Lägg till</button>
        </div>

        <div class="kanban-column" data-state="waiting">
          <h3>⏸️ Väntar på</h3>
          <div class="tasks" id="waiting-tasks"></div>
          <button class="add-task-btn" data-state="waiting">+ Lägg till</button>
        </div>

        <div class="kanban-column" data-state="backlog">
          <h3>📦 Backlog</h3>
          <div class="tasks" id="backlog-tasks"></div>
          <button class="add-task-btn" data-state="backlog">+ Lägg till</button>
        </div>
      </div>

      <div class="completed-section">
        <h3>✅ Klart (senaste veckan)</h3>
        <div id="completed-tasks" class="completed-list"></div>
      </div>
    </section>

    <!-- X Bookmarks Tab -->
    <section id="bookmarks-tab" class="tab-content">
      <div class="bookmarks-header">
        <h2>🐦 X Bookmarks</h2>
        <div class="account-filters">
          <button class="account-btn active" data-account="all">Alla konton</button>
        </div>
      </div>

      <div class="bookmarks-grid">
        <div class="loading">Laddar bookmarks...</div>
      </div>
    </section>

    <!-- Documents Tab -->
    <section id="documents-tab" class="tab-content">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Sök i dokument...">
        <button id="clear-search">✕</button>
      </div>

      <div id="documents-list" class="content-list">
        <div class="loading">Laddar dokument...</div>
      </div>
    </section>

    <!-- Images Tab -->
    <section id="images-tab" class="tab-content">
      <div id="images-grid" class="images-grid">
        <div class="loading">Laddar bilder...</div>
      </div>
    </section>

    <!-- SiS-dokument Tab -->
    <section id="sis-tab" class="tab-content">
      <div class="sis-header">
        <h2>📝 SiS Dokument Generator</h2>
        <p class="subtitle">Skapa professionella dokument med svensk standard</p>
      </div>

      <form id="sis-form" class="sis-form">
        <div class="form-group">
          <label for="doc-title">Dokumenttitel *</label>
          <input type="text" id="doc-title" required placeholder="T.ex. Ansökan, Projektrapport...">
        </div>

        <div class="form-group">
          <label for="doc-content">Innehåll *</label>
          <textarea id="doc-content" required rows="12" placeholder="Skriv ditt dokumentinnehåll här..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="header-choice">Sidhuvud</label>
            <select id="header-choice" required>
              <option value="1">Dagens datum (bara datum)</option>
              <option value="2">Mattias Thyr</option>
              <option value="3">Mattias Thyr | Handskerydsvägen 7, 571 40 Nässjö</option>
              <option value="4">Dokument</option>
              <option value="5">Standarddokument</option>
              <option value="6">Konfident</option>
              <option value="7" selected>Privat korrespondens</option>
              <option value="8">Anpassad text...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="footer-choice">Sidfot</label>
            <select id="footer-choice" required>
              <option value="1">Ingen sidfot</option>
              <option value="2" selected>Handskerydsvägen 7, 571 40 Nässjö | 070 666 10 13 | m@thyr.se | www.thyr.se</option>
              <option value="3">070 666 10 13 | m@thyr.se</option>
              <option value="4">070 323 10 13 | mattiasthyr@gmail.com, mattias@konfident.se | www.konfident.se</option>
              <option value="5">070 323 10 13 | mattias@konfident.se</option>
              <option value="6">m@thyr.se</option>
              <option value="7">mattias@konfident.se</option>
              <option value="8">Sida {page} (sidnummer)</option>
              <option value="9">Anpassad text...</option>
            </select>
          </div>
        </div>

        <div class="form-group" id="custom-header-group" style="display: none;">
          <label for="custom-header">Anpassad sidhuvud-text</label>
          <input type="text" id="custom-header" placeholder="Skriv din egen text...">
        </div>

        <div class="form-group" id="custom-footer-group" style="display: none;">
          <label for="custom-footer">Anpassad sidfot-text</label>
          <input type="text" id="custom-footer" placeholder="Skriv din egen text...">
        </div>

        <div class="form-group">
          <label for="output-name">Filnamn (utan .pdf)</label>
          <input type="text" id="output-name" placeholder="dokument_2026-02-28">
        </div>

        <button type="submit" class="btn-primary" id="generate-btn">
          📄 Generera PDF & DOCX
        </button>

        <div id="sis-status" class="status-message"></div>
      </form>
    </section>
  </main>

  <!-- Modal for viewing content -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
