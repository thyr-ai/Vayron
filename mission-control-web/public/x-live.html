<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐦 Live X Bookmarks - Mission Control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-medium: #141420;
      --bg-light: #1a1a2e;
      --purple: #9333ea;
      --cyan: #06b6d4;
      --text: #e0e0e0;
      --text-dim: #888;
      --border: #2a2a3e;
      
      --blue: #3b82f6;
      --green: #10b981;
      --yellow: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.6;
      overflow: hidden;
    }

    .header {
      background: var(--bg-medium);
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .refresh-btn {
      padding: 0.75rem 1.5rem;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: var(--cyan);
      transform: translateY(-2px);
    }

    .refresh-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      padding: 1.5rem;
      height: calc(100vh - 80px);
      overflow: hidden;
    }

    .column {
      background: var(--bg-light);
      border-radius: 12px;
      border: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .column-header {
      padding: 1.25rem;
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .column-header h2 {
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .account-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .account-indicator.blue { background: var(--blue); }
    .account-indicator.green { background: var(--green); }
    .account-indicator.yellow { background: var(--yellow); }

    .count-badge {
      background: var(--bg-medium);
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .tweets-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .tweet-card {
      background: var(--bg-medium);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
      border-left: 4px solid;
    }

    .tweet-card.blue { border-left-color: var(--blue); }
    .tweet-card.green { border-left-color: var(--green); }
    .tweet-card.yellow { border-left-color: var(--yellow); }

    .tweet-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .tweet-author {
      font-weight: 600;
      color: var(--cyan);
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .tweet-text {
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 0.75rem;
      word-wrap: break-word;
    }

    .tweet-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .tweet-link {
      color: var(--purple);
      text-decoration: none;
      transition: all 0.2s;
    }

    .tweet-link:hover {
      color: var(--cyan);
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
      font-size: 1.1rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-dim);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .status-bar {
      background: var(--bg-medium);
      padding: 0.75rem 2rem;
      border-top: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .back-link {
      color: var(--cyan);
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--purple);
    }

    @media (max-width: 1200px) {
      .columns {
        grid-template-columns: 1fr;
        gap: 1rem;
        overflow-y: auto;
      }

      .tweets-container {
        max-height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐦 Live X Bookmarks</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshBookmarks()">
      🔄 Refresh
    </button>
  </div>

  <div class="columns">
    <!-- Mattias Thyr -->
    <div class="column">
      <div class="column-header">
        <h2>
          <span class="account-indicator blue"></span>
          Mattias Thyr
        </h2>
        <span class="count-badge" id="count-mattiasthyr">0</span>
      </div>
      <div class="tweets-container" id="tweets-mattiasthyr">
        <div class="loading">Laddar...</div>
      </div>
    </div>

    <!-- Övning -->
    <div class="column">
      <div class="column-header">
        <h2>
          <span class="account-indicator green"></span>
          Övning
        </h2>
        <span class="count-badge" id="count-ovningse">0</span>
      </div>
      <div class="tweets-container" id="tweets-ovningse">
        <div class="loading">Laddar...</div>
      </div>
    </div>

    <!-- Konfident -->
    <div class="column">
      <div class="column-header">
        <h2>
          <span class="account-indicator yellow"></span>
          Konfident
        </h2>
        <span class="count-badge" id="count-Konfidentse">0</span>
      </div>
      <div class="tweets-container" id="tweets-Konfidentse">
        <div class="loading">Laddar...</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <a href="/" class="back-link">← Tillbaka till Mission Control</a>
    <span id="lastUpdate">Laddar...</span>
  </div>

  <script>
    const ACCOUNTS = {
      'mattiasthyr': { name: 'Mattias Thyr', color: 'blue' },
      'ovningse': { name: 'Övning', color: 'green' },
      'Konfidentse': { name: 'Konfident', color: 'yellow' }
    };

    let allBookmarks = [];

    async function loadBookmarks() {
      try {
        // Load from existing bookmarks API (from exports)
        const response = await fetch('/api/bookmarks/all?' + Date.now());
        allBookmarks = await response.json();
        renderBookmarks();
        updateStatus();
      } catch (error) {
        console.error('Error loading bookmarks:', error);
        // Try fallback to scraped data
        try {
          const fallback = await fetch('/x-live-bookmarks.json?' + Date.now());
          allBookmarks = await fallback.json();
          renderBookmarks();
          updateStatus();
        } catch (e) {
          showError();
        }
      }
    }

    function renderBookmarks() {
      // Group by account
      const byAccount = {
        'mattiasthyr': [],
        'ovningse': [],
        'Konfidentse': []
      };

      allBookmarks.forEach(bookmark => {
        const handle = bookmark.accountHandle;
        if (byAccount[handle]) {
          byAccount[handle].push(bookmark);
        }
      });

      // Render each column
      Object.keys(ACCOUNTS).forEach(handle => {
        const container = document.getElementById(`tweets-${handle}`);
        const tweets = byAccount[handle] || [];
        
        // Update count
        document.getElementById(`count-${handle}`).textContent = tweets.length;

        if (tweets.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🐦</div>
              <p>Inga tweets hittades</p>
              <p style="font-size: 0.85rem; margin-top: 0.5rem;">Klicka på Refresh för att scrapa</p>
            </div>
          `;
          return;
        }

        container.innerHTML = tweets.map(tweet => `
          <div class="tweet-card ${ACCOUNTS[handle].color}">
            <div class="tweet-author">@${tweet.author}</div>
            <div class="tweet-text">${escapeHtml(tweet.text)}</div>
            <div class="tweet-footer">
              <span>${new Date(tweet.date).toLocaleDateString('sv-SE')}</span>
              <a href="${tweet.url}" target="_blank" rel="noopener" class="tweet-link">
                🔗 Öppna på X
              </a>
            </div>
          </div>
        `).join('');
      });
    }

    function showError() {
      Object.keys(ACCOUNTS).forEach(handle => {
        const container = document.getElementById(`tweets-${handle}`);
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <p>Kunde inte ladda tweets</p>
          </div>
        `;
      });
    }

    function updateStatus() {
      const now = new Date().toLocaleString('sv-SE');
      document.getElementById('lastUpdate').textContent = `Senast uppdaterad: ${now}`;
    }

    async function refreshBookmarks() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Refreshing...';

      try {
        // Just reload from existing data for now
        // Future: Call backend scraper
        // const response = await fetch('/api/x-scrape', { method: 'POST' });
        
        await loadBookmarks();
        btn.textContent = '✅ Refreshed!';
        setTimeout(() => {
          btn.textContent = '🔄 Refresh';
          btn.disabled = false;
        }, 2000);
      } catch (error) {
        console.error('Error:', error);
        btn.textContent = '❌ Error';
        setTimeout(() => {
          btn.textContent = '🔄 Refresh';
          btn.disabled = false;
        }, 2000);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial load
    loadBookmarks();

    // Auto-refresh every 5 minutes
    setInterval(loadBookmarks, 5 * 60 * 1000);
  </script>
</body>
</html>
