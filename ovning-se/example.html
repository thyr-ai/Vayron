<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina Rekord - Övning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .record-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .record-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        
        .record-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .record-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .record-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
        }
        
        .record-detail {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.25rem;
        }
        
        .record-link {
            display: inline-block;
            margin-top: 1rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .record-link:hover {
            text-decoration: underline;
        }
        
        .stats-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stats-summary h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: bold;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
        }
        
        .powered-by {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        
        .powered-by a {
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 Mina Rekord</h1>
        <p class="subtitle">Personliga bästa från Strava</p>
        
        <div id="loading" class="loading">
            Laddar rekord...
        </div>
        
        <div id="records" class="records-grid" style="display: none;"></div>
        
        <div id="stats" class="stats-summary" style="display: none;">
            <h2>📊 Statistik i år</h2>
            <div id="stats-content"></div>
        </div>
        
        <div class="powered-by">
            Powered by <a href="https://www.strava.com" target="_blank">Strava</a>
        </div>
    </div>
    
    <script>
        // Load records from JSON
        fetch('data/records.json')
            .then(response => response.json())
            .then(records => {
                document.getElementById('loading').style.display = 'none';
                displayRecords(records);
                displayStats(records);
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = '❌ Kunde inte ladda rekord';
                console.error('Error loading records:', error);
            });
        
        function displayRecords(records) {
            const container = document.getElementById('records');
            container.style.display = 'grid';
            
            // Längsta löpning
            if (records.longest_run) {
                container.innerHTML += createRecordCard(
                    '🏃',
                    'Längsta Löpning',
                    `${records.longest_run.distance_km} km`,
                    [
                        records.longest_run.name,
                        `Tid: ${records.longest_run.moving_time_formatted}`,
                        formatDate(records.longest_run.date)
                    ],
                    records.longest_run.url
                );
            }
            
            // Snabbaste 10K
            if (records.fastest_10k) {
                container.innerHTML += createRecordCard(
                    '⚡',
                    'Snabbaste 10K',
                    records.fastest_10k.moving_time_formatted,
                    [
                        records.fastest_10k.name,
                        `Pace: ${records.fastest_10k.pace_formatted}/km`,
                        formatDate(records.fastest_10k.date)
                    ],
                    records.fastest_10k.url
                );
            }
            
            // Snabbaste halvmara
            if (records.fastest_half_marathon) {
                container.innerHTML += createRecordCard(
                    '🎽',
                    'Snabbaste Halvmara',
                    records.fastest_half_marathon.moving_time_formatted,
                    [
                        records.fastest_half_marathon.name,
                        `Pace: ${records.fastest_half_marathon.pace_formatted}/km`,
                        formatDate(records.fastest_half_marathon.date)
                    ],
                    records.fastest_half_marathon.url
                );
            }
            
            // Längsta cykeltur
            if (records.longest_ride) {
                container.innerHTML += createRecordCard(
                    '🚴',
                    'Längsta Cykeltur',
                    `${records.longest_ride.distance_km} km`,
                    [
                        records.longest_ride.name,
                        `Tid: ${records.longest_ride.moving_time_formatted}`,
                        formatDate(records.longest_ride.date)
                    ],
                    records.longest_ride.url
                );
            }
            
            // Mest höjdmeter
            if (records.most_elevation_single) {
                container.innerHTML += createRecordCard(
                    '⛰️',
                    'Mest Höjdmeter',
                    `${Math.round(records.most_elevation_single.elevation)} m`,
                    [
                        records.most_elevation_single.name,
                        `${records.most_elevation_single.type}`,
                        formatDate(records.most_elevation_single.date)
                    ],
                    records.most_elevation_single.url
                );
            }
        }
        
        function displayStats(records) {
            const container = document.getElementById('stats');
            const content = document.getElementById('stats-content');
            
            if (records.total_distance_year_km && records.total_moving_time_year_hours) {
                container.style.display = 'block';
                
                const year = new Date().getFullYear();
                
                content.innerHTML = `
                    <div class="stat-row">
                        <span class="stat-label">Total distans ${year}</span>
                        <span class="stat-value">${records.total_distance_year_km.toLocaleString('sv-SE')} km</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Total träningstid ${year}</span>
                        <span class="stat-value">${records.total_moving_time_year_hours.toLocaleString('sv-SE')} timmar</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Formaterad tid</span>
                        <span class="stat-value">${records.total_moving_time_year_formatted}</span>
                    </div>
                `;
            }
        }
        
        function createRecordCard(icon, title, value, details, url) {
            const detailsHtml = details.map(d => `<div class="record-detail">${d}</div>`).join('');
            const linkHtml = url ? `<a href="${url}" target="_blank" class="record-link">Se på Strava →</a>` : '';
            
            return `
                <div class="record-card">
                    <div class="record-icon">${icon}</div>
                    <div class="record-title">${title}</div>
                    <div class="record-value">${value}</div>
                    ${detailsHtml}
                    ${linkHtml}
                </div>
            `;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('sv-SE', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
    </script>
</body>
</html>
