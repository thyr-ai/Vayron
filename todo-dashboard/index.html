<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vayron TODO Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Vayron TODO Dashboard</h1>
            <div class="sync-status">
                <span id="last-sync">Senast uppdaterad: --</span>
                <button id="refresh-btn" onclick="loadTodoData()">🔄 Uppdatera</button>
            </div>
        </header>

        <!-- Overall Progress -->
        <section class="overview">
            <div class="stat-card">
                <h3>Totalt framsteg</h3>
                <div class="progress-circle" id="total-progress">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <text x="18" y="20.35" class="percentage">0%</text>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <h3>Uppgifter</h3>
                <p class="big-number"><span id="completed-count">0</span> / <span id="total-count">0</span></p>
                <p class="label">slutförda</p>
            </div>
            <div class="stat-card">
                <h3>Aktiva projekt</h3>
                <p class="big-number" id="active-projects">0</p>
                <p class="label">pågående</p>
            </div>
        </section>

        <!-- Timeline View -->
        <section class="timeline-section">
            <h2>📅 Runway & Timeline</h2>
            <div id="timeline" class="timeline">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Projects List -->
        <section class="projects-section">
            <h2>📋 Projekt & Uppgifter</h2>
            <div id="projects-list">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- Next Actions -->
        <section class="next-actions">
            <h2>⚡ Nästa steg</h2>
            <div id="next-actions-list">
                <!-- Populated by JS -->
            </div>
        </section>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
